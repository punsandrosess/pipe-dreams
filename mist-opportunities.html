<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,400;1,700&family=Space+Mono:wght@400;700&family=Source+Serif+4:ital,opsz,wght@0,8..60,400;0,8..60,600;1,8..60,400;1,8..60,600&display=swap" rel="stylesheet">
<style>
:root{
  --void:#141410;--card:#1E1E18;--gold:#C9A84C;--gold-dim:rgba(201,168,76,0.3);
  --gold-sub:rgba(201,168,76,0.08);--warm:#F5F0E8;--fog:#6B6B5E;--border:rgba(245,240,232,0.07);
  --green:#1D9E75;--green-bg:rgba(29,158,117,0.12);
  --amber:#C9893A;--amber-bg:rgba(201,137,58,0.12);
  --red:#C0392B;--red-bg:rgba(192,57,43,0.12);
  --gold-accent-bg:rgba(201,168,76,0.1);--gold-accent-border:rgba(201,168,76,0.25);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html{scroll-behavior:smooth;}
body{
  background:var(--void);color:var(--warm);font-family:'Space Mono',monospace;
  font-size:13px;line-height:1.7;padding:20px;
  background-image:linear-gradient(var(--gold-sub) 1px,transparent 1px),linear-gradient(90deg,var(--gold-sub) 1px,transparent 1px);
  background-size:40px 40px;
}

input[type=text]{
  outline:none;background:var(--card);border:1px solid var(--border);
  border-radius:0;padding:5px 10px;color:var(--warm);
  font-family:'Space Mono',monospace;font-weight:700;font-size:12px;
}
input[type=text]:focus{border-color:var(--gold-dim);}
input[type=text].locked-ref{background:var(--void);border-color:var(--border);color:var(--fog);cursor:not-allowed;}
button{cursor:pointer;border:none;font-family:'Space Mono',monospace;font-weight:700;font-size:11px;letter-spacing:.06em;}

table{width:100%;border-collapse:collapse;font-size:12px;border:1px solid var(--border);}
th{
  padding:8px 10px;text-align:center;background:var(--card);color:var(--fog);
  font-size:9px;font-family:'Space Mono',monospace;font-weight:700;
  letter-spacing:.14em;text-transform:uppercase;border-bottom:1px solid var(--border);white-space:nowrap;
}
td{padding:6px 8px;text-align:center;border-bottom:1px solid var(--border);}

.card{
  background:var(--card);border:1px solid var(--border);border-left:3px solid var(--gold);
  padding:18px 20px;margin-bottom:20px;position:relative;
}
.card::before{content:'';position:absolute;top:6px;right:6px;width:10px;height:10px;border-top:1px solid var(--gold-dim);border-right:1px solid var(--gold-dim);}
.card::after{content:'';position:absolute;bottom:6px;left:6px;width:10px;height:10px;border-bottom:1px solid var(--gold-dim);border-left:1px solid var(--gold-dim);}

.sec-label{font-family:'Space Mono',monospace;font-weight:700;font-size:9px;color:var(--gold);letter-spacing:.22em;text-transform:uppercase;margin-bottom:8px;display:block;}

.overlay{position:fixed;inset:0;background:rgba(0,0,0,0.7);display:flex;align-items:center;justify-content:center;z-index:100;backdrop-filter:blur(4px);}
.modal{
  background:var(--card);border:1px solid var(--gold-dim);padding:28px;
  width:440px;max-width:92vw;position:relative;
}
.modal::before{content:'';position:absolute;top:8px;left:8px;width:14px;height:14px;border-top:1px solid var(--gold);border-left:1px solid var(--gold);}
.modal::after{content:'';position:absolute;bottom:8px;right:8px;width:14px;height:14px;border-bottom:1px solid var(--gold);border-right:1px solid var(--gold);}

.flash{font-family:'Space Mono',monospace;font-size:9px;color:var(--green);letter-spacing:.12em;opacity:0;transition:opacity .3s;display:inline-block;}
.flash.show{opacity:1;}

textarea{
  outline:none;border:1px solid var(--border);padding:8px 12px;
  font-family:'Source Serif 4',serif;font-style:italic;font-size:13px;
  color:var(--warm);resize:vertical;min-height:72px;width:100%;
  background:var(--void);
}
textarea:focus{border-color:var(--gold-dim);}
textarea::placeholder{color:var(--fog);}

/* ── MOBILE ── */
@media(max-width:600px){
  body{padding:12px;}
  .card{padding:14px 12px;}
  .modal{width:calc(100vw - 24px);max-width:calc(100vw - 24px);padding:20px 16px 18px;}
  .mob-tab-bar{width:100%!important;}
  .mob-tab-bar button{flex:1;padding:8px 6px!important;font-size:10px!important;}
  .mob-header{flex-direction:column!important;align-items:flex-start!important;}
  .mob-header-right{width:100%!important;flex-direction:column!important;align-items:flex-start!important;gap:8px!important;}
  .mob-lock-pill{width:100%!important;justify-content:space-between!important;}
  .mob-legend{flex-wrap:wrap!important;gap:6px!important;}
  .mob-hero{flex-direction:column!important;align-items:flex-start!important;gap:12px!important;}
  .mob-hero-stats{gap:16px!important;}
  .mob-refs{flex-direction:column!important;align-items:flex-start!important;gap:12px!important;}
  .mob-qgoals{display:grid!important;grid-template-columns:1fr 1fr!important;gap:8px!important;}
  .mob-kpi-grid{grid-template-columns:repeat(2,1fr)!important;gap:8px!important;}
  .mob-kpi-grid > div{padding:12px 14px!important;}
  .mob-summary td,.mob-summary th{padding:7px 6px!important;font-size:11px!important;}
  .mob-log-entry{padding:10px 12px!important;}
  .mob-log-header{flex-direction:column!important;align-items:flex-start!important;gap:4px!important;}
}
@media(max-width:400px){
  .mob-kpi-grid{grid-template-columns:1fr 1fr!important;}
  .mob-hero-stats{flex-direction:column!important;gap:8px!important;}
}
</style>

<div id="app">
  <div style="padding:60px;text-align:center;font-family:'Space Mono',monospace;font-size:11px;color:var(--fog);letter-spacing:.14em;text-transform:uppercase;">
    Loading shared data…
  </div>
</div>
<div id="modal-root"></div>

<script>
const B={
  ink:"#F5F0E8",cream:"#1E1E18",fog:"#141410",mist:"rgba(245,240,232,0.07)",stone:"#6B6B5E",
  mid:"#6B6B5E",orange:"#C9A84C",teal:"#1D9E75",tealBg:"rgba(29,158,117,0.12)",
  amber:"#C9893A",amberBg:"rgba(201,137,58,0.12)",red:"#C0392B",redBg:"rgba(192,57,43,0.12)",
  navy:"#C9A84C",white:"#1E1E18",
  // New semantic refs
  gold:"#C9A84C",goldDim:"rgba(201,168,76,0.3)",goldSub:"rgba(201,168,76,0.08)",
  warm:"#F5F0E8",void:"#141410",card:"#1E1E18",border:"rgba(245,240,232,0.07)",
  green:"#1D9E75",greenBg:"rgba(29,158,117,0.12)",
  realAmber:"#C9893A",realAmberBg:"rgba(201,137,58,0.12)",
  realRed:"#C0392B",realRedBg:"rgba(192,57,43,0.12)",
};

// For pct coloring use real colors
const pctColorReal=(a,g)=>{if(!g)return B.stone;const r=a/g;return r>=1?B.green:r>=.75?B.realAmber:B.realRed};
const pctBgReal=(a,g)=>{if(!g)return B.border;const r=a/g;return r>=1?B.greenBg:r>=.75?B.realAmberBg:B.realRedBg};

const QUARTERS=["Q1FY26","Q2FY26","Q3FY26","Q4FY26"];
const CHANNELS=["Website/Inbound","Paid Ads","Events","SDR Outbound","Webinars"];
const WEIGHTS={"Website/Inbound":.45,"Paid Ads":.10,"Events":.20,"SDR Outbound":.15,"Webinars":.10};
const SEASONALITY=[.2889,.2889,.2222,.20];
const WEEKS=13;
const INIT_ACTUALS={"Website/Inbound":[48,50,63,32],"Paid Ads":[2,1,4,0],"Events":[7,30,9,0],"SDR Outbound":[0,0,0,0],"Webinars":[1,3,2,1]};
const ASP0=30000;
const SK={actuals:"cantina_v5_actuals",dollar:"cantina_v5_dollar",refs:"cantina_v5_refs",lock:"cantina_v5_lock",goals:"cantina_v5_goals",log:"cantina_v5_log"};

const fmtN=v=>Math.round(v).toLocaleString("en-US");
const fmt$=v=>"$"+fmtN(v);
const fmtM=v=>"$"+(v/1e6).toLocaleString("en-US",{minimumFractionDigits:2,maximumFractionDigits:2})+"M";
const fmtPct=(a,g)=>!g?"—":Math.round((a/g)*100)+"%";
const parseRaw=s=>Number(String(s).replace(/[^0-9.-]/g,""))||0;
const pctColor=(a,g)=>{if(!g)return B.stone;const r=a/g;return r>=1?B.green:r>=.75?B.realAmber:B.realRed};
const pctBg=(a,g)=>{if(!g)return B.border;const r=a/g;return r>=1?B.greenBg:r>=.75?B.realAmberBg:B.realRedBg};
const sumRow=(o,ch)=>o[ch].reduce((a,b)=>a+b,0);
const sumCol=(o,qi)=>CHANNELS.reduce((s,ch)=>s+o[ch][qi],0);
const sumAll=o=>CHANNELS.reduce((s,ch)=>s+sumRow(o,ch),0);
const clone=o=>JSON.parse(JSON.stringify(o));
const tsNow=()=>new Date().toLocaleString("en-US",{month:"short",day:"numeric",year:"numeric",hour:"numeric",minute:"2-digit"});
const dirWord=(a,b)=>a>b?"increased":a<b?"decreased":"updated";
const initDollar=()=>{const r={};CHANNELS.forEach(ch=>{r[ch]=INIT_ACTUALS[ch].map(v=>v*ASP0)});return r};

function buildManualGoals(asp,revGoal,convRate,mktgPct){
  const totalPipe=convRate>0?revGoal/(convRate/100):0;
  const mktgGoal=totalPipe*(mktgPct/100);
  const qGoals=SEASONALITY.map(x=>mktgGoal*x);
  const goals={};CHANNELS.forEach(ch=>{goals[ch]=qGoals.map(qd=>Math.round((qd*WEIGHTS[ch])/asp))});
  const goalsDollar={};CHANNELS.forEach(ch=>{goalsDollar[ch]=goals[ch].map(v=>v*asp)});
  return{goals,goalsDollar};
}

let state={
  asp:30000,convRate:20,revGoal:10000000,revActual:0,mktgPct:45,
  actuals:clone(INIT_ACTUALS),actDollar:initDollar(),
  manualGoals:null,goalsLocked:false,lockedAt:null,
  changeLog:[],tab:"opps",editCell:null,modal:null,loaded:false
};
let flashTimer=null;

async function loadFromStorage(){
  try{
    const results=await Promise.all(Object.values(SK).map(k=>window.storage.get(k,true).catch(()=>null)));
    const [ra,rd,rr,rl,rg,rlog]=results;
    if(ra)state.actuals=JSON.parse(ra.value);
    if(rd)state.actDollar=JSON.parse(rd.value);
    if(rr){const r=JSON.parse(rr.value);Object.assign(state,{asp:r.asp||state.asp,convRate:r.convRate||state.convRate,revGoal:r.revGoal||state.revGoal,revActual:r.revActual??state.revActual,mktgPct:r.mktgPct||state.mktgPct});}
    if(rl){const l=JSON.parse(rl.value);state.goalsLocked=l.locked;state.lockedAt=l.lockedAt||null;}
    if(rg)state.manualGoals=JSON.parse(rg.value);
    else state.manualGoals=buildManualGoals(state.asp,state.revGoal,state.convRate,state.mktgPct);
    if(rlog)state.changeLog=JSON.parse(rlog.value);
  }catch(e){
    if(!state.manualGoals)state.manualGoals=buildManualGoals(state.asp,state.revGoal,state.convRate,state.mktgPct);
  }
  state.loaded=true;render();
}

async function saveActuals(){try{await window.storage.set(SK.actuals,JSON.stringify(state.actuals),true);await window.storage.set(SK.dollar,JSON.stringify(state.actDollar),true);}catch(e){}showFlash();}
async function saveRefs(){try{await window.storage.set(SK.refs,JSON.stringify({asp:state.asp,convRate:state.convRate,revGoal:state.revGoal,revActual:state.revActual,mktgPct:state.mktgPct}),true);}catch(e){}}
async function saveGoals(){try{await window.storage.set(SK.goals,JSON.stringify(state.manualGoals),true);}catch(e){}showFlash();}
async function saveLock(){try{await window.storage.set(SK.lock,JSON.stringify({locked:state.goalsLocked,lockedAt:state.lockedAt}),true);}catch(e){}}
async function saveLog(){try{await window.storage.set(SK.log,JSON.stringify(state.changeLog),true);}catch(e){}}

function showFlash(){
  const el=document.getElementById("save-flash");
  if(el){el.classList.add("show");clearTimeout(flashTimer);flashTimer=setTimeout(()=>el.classList.remove("show"),1800);}
}

function getGoals(){return state.manualGoals;}
function deriveTotals(){
  const totalPipe=state.convRate>0?state.revGoal/(state.convRate/100):0;
  const mktgGoal=totalPipe*(state.mktgPct/100);
  const g=getGoals();
  const totalActOpps=sumAll(state.actuals);
  const totalGoalOpps=sumAll(g.goals);
  const totalGoalPipe=CHANNELS.reduce((s,ch)=>s+g.goalsDollar[ch].reduce((a,b)=>a+b,0),0);
  const totalActPipe=CHANNELS.reduce((s,ch)=>s+state.actDollar[ch].reduce((a,b)=>a+b,0),0);
  const impliedRev=totalActPipe*(state.convRate/100);
  const remaining=Math.max(0,mktgGoal-totalActPipe);
  return{totalPipe,mktgGoal,totalActOpps,totalGoalOpps,totalGoalPipe,totalActPipe,impliedRev,remaining};
}

// Lock and unlock fire immediately — no modals, no friction
async function lockGoals(){
  state.goalsLocked=true;state.lockedAt=tsNow();
  await saveLock();
  state.changeLog=[{id:Date.now(),ts:tsNow(),type:"lock",desc:"Goals locked."},...state.changeLog];
  await saveLog();render();
}
async function unlockGoals(){
  state.goalsLocked=false;state.lockedAt=null;
  await saveLock();
  state.changeLog=[{id:Date.now(),ts:tsNow(),type:"unlock",desc:"Goals unlocked."},...state.changeLog];
  await saveLog();render();
}

// Re-lock: show all edits since last unlock, require one sign-off note
function showRelockModal(edits){
  state.modal={mode:"relock",edits:edits||[]};renderModal();
}

function showGoalEditModal(ch,qi,isDollar,currentVal){
  state.modal={mode:"goal",ch,qi,isDollar,currentVal};renderModal();
}
function closeModal(){state.modal=null;renderModal();}

function renderModal(){
  const root=document.getElementById("modal-root");
  if(!state.modal){root.innerHTML="";return;}
  const m=state.modal;

  // ── Relock modal — shows every change since unlock, requires sign-off ──
  if(m.mode==="relock"){
    const edits=m.edits||[];
    const editSummary=edits.length===0
      ?`<div style="font-family:'Source Serif 4',serif;font-style:italic;font-size:13px;color:#6B6B5E;padding:12px 14px;background:#141410;border:1px solid rgba(245,240,232,0.07)">No goal changes were made during this session.</div>`
      :`<div style="display:flex;flex-direction:column;gap:4px;max-height:180px;overflow-y:auto;">
          ${edits.map(e=>{
            const dirColor=e.dir==="increased"?"#1D9E75":"#C0392B";
            const arrow=e.dir==="increased"?"↑":"↓";
            return`<div style="background:#141410;border:1px solid rgba(245,240,232,0.07);border-left:2px solid ${dirColor};padding:8px 12px;display:flex;justify-content:space-between;align-items:center;gap:12px;flex-wrap:wrap">
              <span style="font-family:'Space Mono',monospace;font-size:10px;color:#F5F0E8"><span style="color:${dirColor}">${arrow}</span> ${e.desc}</span>
              <span style="font-family:'Space Mono',monospace;font-size:9px;color:#6B6B5E;white-space:nowrap">${e.ts}</span>
            </div>`;
          }).join("")}
        </div>`;

    root.innerHTML=`
    <div class="overlay" id="overlay">
      <div class="modal">
        <div style="margin-bottom:12px">
          <span style="font-family:'Space Mono',monospace;font-size:9px;color:#C9A84C;letter-spacing:.22em;text-transform:uppercase">Lock Goals</span>
        </div>
        <div style="font-family:'Space Mono',monospace;font-size:9px;color:#6B6B5E;letter-spacing:.12em;text-transform:uppercase;margin-bottom:8px">${edits.length} change${edits.length!==1?"s":""} made this session</div>
        <div style="margin-bottom:18px">${editSummary}</div>
        <div style="margin-bottom:22px">
          <div style="font-family:'Space Mono',monospace;font-size:9px;color:#6B6B5E;letter-spacing:.14em;text-transform:uppercase;margin-bottom:8px">Sign-off note <span style="color:#C0392B">*</span></div>
          <textarea id="modal-note" placeholder="e.g. All changes reviewed and approved. Locking for board review." style="background:#141410;border:1px solid rgba(245,240,232,0.07);"></textarea>
          <div id="modal-note-err" style="font-family:'Space Mono',monospace;font-size:10px;color:#C0392B;margin-top:4px;display:none">A sign-off note is required to lock.</div>
        </div>
        <div style="display:flex;gap:10px;justify-content:flex-end">
          <button id="modal-cancel" style="padding:8px 18px;background:transparent;border:1px solid rgba(245,240,232,0.12);color:#6B6B5E;letter-spacing:.08em">Cancel</button>
          <button id="modal-confirm" style="padding:8px 20px;background:#C9A84C;color:#141410;font-weight:700;letter-spacing:.08em">Lock &amp; Sign Off</button>
        </div>
      </div>
    </div>`;

    document.getElementById("modal-cancel").onclick=closeModal;
    document.getElementById("overlay").onclick=e=>{if(e.target.id==="overlay")closeModal();};
    document.getElementById("modal-note").focus();
    document.getElementById("modal-confirm").onclick=async()=>{
      const note=document.getElementById("modal-note").value.trim();
      const noteErr=document.getElementById("modal-note-err");
      if(!note){noteErr.style.display="block";return;}
      noteErr.style.display="none";
      state.goalsLocked=true;state.lockedAt=tsNow();
      await saveLock();
      const desc=edits.length===0
        ?"Goals locked — no changes this session."
        :`Goals locked — ${edits.length} change${edits.length!==1?"s":""} signed off.`;
      state.changeLog=[{id:Date.now(),ts:tsNow(),type:"lock",desc,note},...state.changeLog];
      await saveLog();
      closeModal();render();
    };
    return;
  }

  // ── Goal edit modal — enter new value, live diff shown, auto-logs ───
  const typeLabel=m.isDollar?"$ Pipeline":"# Opportunities";
  const displayCur=m.isDollar?fmt$(m.currentVal):fmtN(m.currentVal);

  root.innerHTML=`
  <div class="overlay" id="overlay">
    <div class="modal">
      <div style="margin-bottom:16px">
        <span style="font-family:'Space Mono',monospace;font-size:9px;color:#C9A84C;letter-spacing:.22em;text-transform:uppercase">Edit Goal</span>
      </div>
      <div style="font-family:'Playfair Display',serif;font-size:18px;font-weight:700;color:#F5F0E8;margin-bottom:4px">${m.ch}</div>
      <div style="font-family:'Space Mono',monospace;font-size:10px;color:#6B6B5E;margin-bottom:20px;letter-spacing:.06em">${QUARTERS[m.qi]} · ${typeLabel}</div>

      <div style="margin-bottom:16px">
        <div style="font-family:'Space Mono',monospace;font-size:9px;color:#6B6B5E;letter-spacing:.14em;text-transform:uppercase;margin-bottom:8px">New value <span style="color:#C0392B">*</span></div>
        <div style="display:flex;align-items:center;gap:12px">
          <span style="font-family:'Space Mono',monospace;font-size:13px;color:#6B6B5E;text-decoration:line-through">${displayCur}</span>
          <span style="color:#6B6B5E">→</span>
          <input type="text" id="modal-newval" placeholder="${m.isDollar?"e.g. 450000":"e.g. 18"}" style="flex:1;font-size:14px;padding:8px 12px;background:#141410;border:1px solid rgba(201,168,76,0.3);color:#F5F0E8;font-family:'Space Mono',monospace;font-weight:700;" />
        </div>
        <div id="modal-preview" style="font-family:'Space Mono',monospace;font-size:10px;color:#6B6B5E;margin-top:8px;min-height:18px;letter-spacing:.06em"></div>
        <div id="modal-val-err" style="font-family:'Space Mono',monospace;font-size:10px;color:#C0392B;margin-top:4px;display:none">Please enter a valid number.</div>
      </div>

      <div style="display:flex;gap:10px;justify-content:flex-end">
        <button id="modal-cancel" style="padding:8px 18px;background:transparent;border:1px solid rgba(245,240,232,0.12);color:#6B6B5E;letter-spacing:.08em">Cancel</button>
        <button id="modal-confirm" style="padding:8px 20px;background:#C9A84C;color:#141410;font-weight:700;letter-spacing:.08em">Save</button>
      </div>
    </div>
  </div>`;

  document.getElementById("modal-cancel").onclick=closeModal;
  document.getElementById("overlay").onclick=e=>{if(e.target.id==="overlay")closeModal();};
  const inp=document.getElementById("modal-newval");
  const preview=document.getElementById("modal-preview");
  inp.focus();

  // Live preview as user types
  inp.addEventListener("input",()=>{
    const v=parseRaw(inp.value);
    if(!v){preview.textContent="";return;}
    const from=m.isDollar?fmt$(m.currentVal):fmtN(m.currentVal);
    const to=m.isDollar?fmt$(v):fmtN(v);
    const dir=v>m.currentVal?"Increased":v<m.currentVal?"Decreased":"No change";
    const dirColor=v>m.currentVal?"#1D9E75":v<m.currentVal?"#C0392B":"#6B6B5E";
    preview.innerHTML=`<span style="color:${dirColor}">${dir}:</span> ${from} → <span style="color:${dirColor};font-weight:700">${to}</span>`;
  });

  document.getElementById("modal-confirm").onclick=async()=>{
    const newVal=parseRaw(inp.value);
    const valErr=document.getElementById("modal-val-err");
    if(!newVal){valErr.style.display="block";return;}
    valErr.style.display="none";

    const oldVal=m.isDollar?state.manualGoals.goalsDollar[m.ch][m.qi]:state.manualGoals.goals[m.ch][m.qi];
    if(m.isDollar){
      state.manualGoals.goalsDollar[m.ch][m.qi]=newVal;
      state.manualGoals.goals[m.ch][m.qi]=Math.round(newVal/state.asp);
    }else{
      state.manualGoals.goals[m.ch][m.qi]=newVal;
      state.manualGoals.goalsDollar[m.ch][m.qi]=newVal*state.asp;
    }
    await saveGoals();

    const dir=dirWord(newVal,oldVal);
    const fromFmt=m.isDollar?fmt$(oldVal):fmtN(oldVal);
    const toFmt=m.isDollar?fmt$(newVal):fmtN(newVal);
    const metric=m.isDollar?"pipeline":"opps";
    const verb=dir==="increased"?"Increased":dir==="decreased"?"Decreased":"Updated";
    const desc=verb+" "+m.ch+" "+QUARTERS[m.qi]+" "+metric+" goal: "+fromFmt+" → "+toFmt;

    state.changeLog=[{id:Date.now(),ts:tsNow(),type:"goal_edit",desc,from:fromFmt,to:toFmt,dir,ch:m.ch,quarter:QUARTERS[m.qi],metric:typeLabel},...state.changeLog];
    await saveLog();
    closeModal();render();
  };
}

function pctBadge(a,g){

function goalCell(val,ch,qi,isDollar){

  const hint=locked?"Click to edit (reason required)":"Click to edit goal";
  return`<td style="padding:4px 6px;text-align:center;background:rgba(201,168,76,0.06)">
    <span data-goal-click="1" data-ch="${ch}" data-qi="${qi}" data-dollar="${isDollar?1:0}" data-val="${val}"

}

function actualCell(val,ch,qi,isDollar){
  const cellId=`act-${ch.replace(/[^a-z]/gi,'')}-${qi}${isDollar?'-d':''}`;
  const display=isDollar?fmt$(val):fmtN(val);

    return`<td style="padding:4px 6px;text-align:center">
      <input type="text" id="${cellId}-input" value="${val}"

        style="width:${isDollar?80:52}px;text-align:center;border:1px solid #1D9E75;padding:2px 6px;font-size:${isDollar?10:11}px;font-family:'Space Mono',monospace;font-weight:700;color:#F5F0E8;outline:none;background:#141410;" />
    </td>`;
  }
  return`<td style="padding:4px 6px;text-align:center">
    <span data-edit="${cellId}" data-ch="${ch}" data-qi="${qi}" data-dollar="${isDollar?1:0}"
      style="cursor:pointer;padding:2px 8px;display:inline-block;min-width:${isDollar?60:36}px;background:rgba(29,158,117,0.1);border:1px solid rgba(29,158,117,0.3);font-size:${isDollar?10:11}px;color:#1D9E75;font-weight:700;font-family:'Space Mono',monospace">

function refInput(label,val,key,prefix,suffix,w=100){
  const lk=state.goalsLocked;
  return`<div style="display:flex;flex-direction:column;gap:5px">
    <span style="font-family:'Space Mono',monospace;font-weight:700;font-size:9px;color:${lk?'#6B6B5E':'#C9A84C'};letter-spacing:.14em;text-transform:uppercase">${label}</span>

      ${suffix?`<span style="font-family:'Space Mono',monospace;font-weight:700;color:#6B6B5E;font-size:12px">${suffix}</span>`:""}

        </tr>`).join("")}
        <tr style="border-top:1px solid rgba(201,168,76,0.25)">
          <td style="padding:8px 10px;color:#F5F0E8;font-weight:700;font-size:11px;text-align:left;font-family:'Space Mono',monospace;letter-spacing:.06em">Total Opps</td>
          ${QUARTERS.map((_,qi)=>{const gv=sumCol(g.goals,qi),av=sumCol(state.actuals,qi);return`<td style="padding:6px 8px;color:${GoalC};font-weight:700;font-family:'Space Mono',monospace;font-size:10px;background:rgba(201,168,76,0.06)">${fmtN(gv)}</td><td style="padding:6px 8px;color:${ActC};font-weight:700;font-family:'Space Mono',monospace;font-size:10px">${fmtN(av)}</td><td style="padding:5px 6px">${pctBadge(av,gv)}</td>`}).join("")}
          <td style="padding:6px 8px;color:${GoalC};font-weight:700;font-family:'Space Mono',monospace;font-size:10px;background:rgba(201,168,76,0.06)">${fmtN(dt.totalGoalOpps)}</td>
          <td style="padding:6px 8px;color:${ActC};font-weight:700;font-family:'Space Mono',monospace;font-size:10px">${fmtN(dt.totalActOpps)}</td>
          <td style="padding:5px 6px">${pctBadge(dt.totalActOpps,dt.totalGoalOpps)}</td>
        </tr>
        <tr>
          <td style="padding:5px 10px;color:#6B6B5E;font-family:'Space Mono',monospace;font-size:9px;text-align:left;letter-spacing:.08em">Avg Opps / Week</td>
          ${QUARTERS.map((_,qi)=>`<td style="padding:5px 8px;color:#6B6B5E;font-family:'Space Mono',monospace;font-size:9px">${(sumCol(g.goals,qi)/WEEKS).toFixed(1)}</td><td></td><td></td>`).join("")}
          <td></td><td></td><td></td>
        </tr>
      </tbody>
    </table></div>`;

  } else if(state.tab==="dollars"){
    html+=tableHint+`<div style="overflow-x:auto;margin-bottom:8px"><table>
      <thead><tr>
        <th style="text-align:left">Channel</th>
        ${QUARTERS.map(()=>`<th style="color:${GoalC}">Goal${locked?" 🔒":""}</th><th style="color:${ActC}">Actual</th><th>%</th>`).join("")}
        <th style="color:${GoalC}">Total Goal</th><th style="color:${ActC}">Total Actual</th><th>Total %</th>
      </tr></thead>
      <tbody>
        ${CHANNELS.map((ch,i)=>`<tr style="background:${rowBg(i)}">
          <td style="padding:7px 10px;color:#F5F0E8;font-weight:700;font-size:11px;border-right:1px solid rgba(245,240,232,0.07);text-align:left;font-family:'Source Serif 4',serif">${ch}</td>
          ${QUARTERS.map((_,qi)=>`${goalCell(g.goalsDollar[ch][qi],ch,qi,true)}${actualCell(state.actDollar[ch][qi],ch,qi,true)}<td style="padding:5px 6px">${pctBadge(state.actDollar[ch][qi],g.goalsDollar[ch][qi])}</td>`).join("")}
          <td style="padding:6px 8px;color:${GoalC};font-weight:700;font-family:'Space Mono',monospace;font-size:10px;background:rgba(201,168,76,0.06)">${fmt$(g.goalsDollar[ch].reduce((a,b)=>a+b,0))}</td>
          <td style="padding:6px 8px;color:${ActC};font-weight:700;font-family:'Space Mono',monospace;font-size:10px">${fmt$(state.actDollar[ch].reduce((a,b)=>a+b,0))}</td>
          <td style="padding:5px 6px">${pctBadge(state.actDollar[ch].reduce((a,b)=>a+b,0),g.goalsDollar[ch].reduce((a,b)=>a+b,0))}</td>
        </tr>`).join("")}
        <tr style="border-top:1px solid rgba(201,168,76,0.25)">
          <td style="padding:8px 10px;color:#F5F0E8;font-weight:700;font-size:11px;text-align:left;font-family:'Space Mono',monospace;letter-spacing:.06em">Total Pipeline</td>
          ${QUARTERS.map((_,qi)=>{const gv=CHANNELS.reduce((s,ch)=>s+g.goalsDollar[ch][qi],0),av=CHANNELS.reduce((s,ch)=>s+state.actDollar[ch][qi],0);return`<td style="padding:6px 8px;color:${GoalC};font-weight:700;font-family:'Space Mono',monospace;font-size:10px;background:rgba(201,168,76,0.06)">${fmt$(gv)}</td><td style="padding:6px 8px;color:${ActC};font-weight:700;font-family:'Space Mono',monospace;font-size:10px">${fmt$(av)}</td><td style="padding:5px 6px">${pctBadge(av,gv)}</td>`}).join("")}
          <td style="padding:6px 8px;color:${GoalC};font-weight:700;font-family:'Space Mono',monospace;font-size:10px;background:rgba(201,168,76,0.06)">${fmt$(dt.totalGoalPipe)}</td>
          <td style="padding:6px 8px;color:${ActC};font-weight:700;font-family:'Space Mono',monospace;font-size:10px">${fmt$(dt.totalActPipe)}</td>
          <td style="padding:5px 6px">${pctBadge(dt.totalActPipe,dt.totalGoalPipe)}</td>
        </tr>
        <tr>
          <td style="padding:5px 10px;color:#6B6B5E;font-family:'Space Mono',monospace;font-size:9px;text-align:left;letter-spacing:.08em">Avg $ / Week Req</td>
          ${QUARTERS.map((_,qi)=>`<td style="padding:5px 8px;color:#6B6B5E;font-family:'Space Mono',monospace;font-size:9px">${fmt$(CHANNELS.reduce((s,ch)=>s+g.goalsDollar[ch][qi],0)/WEEKS)}</td><td></td><td></td>`).join("")}
          <td></td><td></td><td></td>
        </tr>
      </tbody>
    </table></div>`;

  } else {
    // ── Change Log ──
    html+=`<div class="card" style="margin-bottom:8px">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px">
        <span class="sec-label" style="margin-bottom:0">Goal Change Log</span>
        <span style="font-family:'Space Mono',monospace;font-size:9px;color:#6B6B5E;letter-spacing:.1em">${state.changeLog.length} ${state.changeLog.length===1?"entry":"entries"} · shared</span>
      </div>
      ${state.changeLog.length===0
        ?`<div style="text-align:center;padding:40px 0;font-family:'Source Serif 4',serif;font-style:italic;font-size:14px;color:#6B6B5E">No changes logged yet.<br><span style="font-size:12px">Every goal edit and lock/unlock requires a note and is recorded here.</span></div>`
        :`<div style="display:flex;flex-direction:column;gap:10px">
          ${state.changeLog.map(e=>{
            const typeColors={
              lock:{color:"#C9A84C",label:"Locked"},
              unlock:{color:"#1D9E75",label:"Unlocked"},
              goal_edit:{color:e.dir==="increased"?"#1D9E75":e.dir==="decreased"?"#C0392B":"#6B6B5E",label:e.dir==="increased"?"↑ Increased":e.dir==="decreased"?"↓ Decreased":"~ Updated"}
            };
            const ts=typeColors[e.type]||{color:"#6B6B5E",label:e.type};
            const noteText=e.note||e.reason||null;
            return`<div style="background:#141410;border:1px solid rgba(245,240,232,0.07);border-left:2px solid ${ts.color};padding:14px 16px" class="mob-log-entry">
              <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:12px;margin-bottom:${noteText?'10px':'0'};flex-wrap:wrap" class="mob-log-header">
                <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">
                  <span style="font-family:'Space Mono',monospace;font-size:9px;font-weight:700;color:${ts.color};background:${ts.color}18;padding:2px 8px;letter-spacing:.14em;text-transform:uppercase;white-space:nowrap">${ts.label}</span>
                  <span style="font-family:'Playfair Display',serif;font-size:15px;font-weight:700;color:#F5F0E8">${e.desc}</span>
                </div>
                <span style="font-family:'Space Mono',monospace;font-size:9px;color:#6B6B5E;white-space:nowrap;letter-spacing:.06em;flex-shrink:0">${e.ts}</span>
              </div>
              ${noteText?`<div style="background:#1E1E18;border:1px solid rgba(245,240,232,0.07);padding:8px 12px;display:flex;gap:8px;align-items:flex-start">
                <span style="font-family:'Space Mono',monospace;font-size:9px;color:#6B6B5E;text-transform:uppercase;letter-spacing:.12em;white-space:nowrap;padding-top:2px">Note:</span>
                <span style="font-family:'Source Serif 4',serif;font-style:italic;font-size:13px;color:#F5F0E8;line-height:1.6">${noteText}</span>
              </div>`:""}
            </div>`;
          }).join("")}
        </div>`
      }
    </div>`;
  }

  html+=`<div style="margin-top:16px;font-family:'Space Mono',monospace;color:#6B6B5E;font-size:9px;letter-spacing:.1em;border-top:1px solid rgba(245,240,232,0.07);padding-top:12px">
    <span style="color:${GoalC}">GOLD</span> = goals (reason always required) · <span style="color:${ActC}">GREEN</span> = actuals (free edit, auto-save) · Data shared across all viewers
  </div>`;

  document.getElementById("app").innerHTML=html;
  bindEvents();
  renderModal();
}

function handleLockClick(){
  // Find the most recent lock entry (or 0 if never locked)
  const lastLock=state.changeLog.find(e=>e.type==="lock");
  const lastLockId=lastLock?lastLock.id:0;
  // Any goal edits that happened after the last lock (or ever, if never locked)
  const editsSinceLock=state.changeLog.filter(e=>e.type==="goal_edit"&&e.id>lastLockId);
  if(editsSinceLock.length>0){
    showRelockModal(editsSinceLock);
  }else{
    lockGoals();
  }
}

function bindEvents(){
  const lb=document.getElementById("btn-lock");
  const ub=document.getElementById("btn-unlock");
  if(lb)lb.addEventListener("click",handleLockClick);
  if(ub)ub.addEventListener("click",unlockGoals);

  document.querySelectorAll("[data-refkey]").forEach(inp=>{
    if(inp.readOnly)return;
    inp.addEventListener("blur",async e=>{state[e.target.dataset.refkey]=parseRaw(e.target.value);await saveRefs();state.editCell=null;render();});
    inp.addEventListener("keydown",e=>{if(e.key==="Enter")e.target.blur();});
  });

  document.querySelectorAll("[data-tab]").forEach(btn=>{
    btn.addEventListener("click",e=>{state.tab=e.currentTarget.dataset.tab;state.editCell=null;render();});
  });

  document.querySelectorAll("[data-goal-click]").forEach(span=>{
    span.addEventListener("click",e=>{
      const el=e.currentTarget;
      showGoalEditModal(el.dataset.ch,parseInt(el.dataset.qi),el.dataset.dollar==="1",parseRaw(el.dataset.val));
    });
  });

  document.querySelectorAll("[data-edit]").forEach(span=>{
    span.addEventListener("click",e=>{
      state.editCell=e.currentTarget.dataset.edit;render();
      setTimeout(()=>{const inp=document.getElementById(state.editCell+"-input");if(inp){inp.focus();inp.select();}},10);
    });
  });
  document.querySelectorAll("[data-cell]").forEach(inp=>{
    const commit=async e=>{
      const ch=e.target.dataset.ch,qi=parseInt(e.target.dataset.qi),isDollar=e.target.dataset.dollar==="1";
      if(isDollar){state.actDollar[ch][qi]=parseRaw(e.target.value);}else{state.actuals[ch][qi]=parseRaw(e.target.value);}
      await saveActuals();state.editCell=null;render();
    };
    inp.addEventListener("blur",commit);
    inp.addEventListener("keydown",e=>{if(e.key==="Enter")e.target.blur();});
  });
}

loadFromStorage();
</script>
