<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pipeline Fitness Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,400;1,700&family=Space+Mono:wght@400;700&family=Source+Serif+4:ital,opsz,wght@0,8..60,400;0,8..60,600;1,8..60,400;1,8..60,600&display=swap" rel="stylesheet">
<style>
/* ===== RESET & BASE ===== */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{font-size:15px}
body{font-family:'Space Mono',monospace;background:#141410;color:#F5F0E8;min-height:100vh;
  background-image:linear-gradient(rgba(201,168,76,0.05) 1px,transparent 1px),linear-gradient(90deg,rgba(201,168,76,0.05) 1px,transparent 1px);background-size:40px 40px}
input,textarea,select,button{font-family:inherit}
/* ===== BRAND PALETTE ===== */
:root{
  --ink:#F5F0E8;--void:#141410;--card:#1E1E18;--border:rgba(245,240,232,0.07);--borderSolid:#2A2A22;
  --fog:#6B6B5E;--gold:#C9A84C;--goldDim:rgba(201,168,76,0.3);--goldSub:rgba(201,168,76,0.08);
  --warm:#F5F0E8;--green:#1D9E75;--greenBg:rgba(29,158,117,0.1);
  --amber:#E8933A;--amberBg:rgba(232,147,58,0.1);--red:#D85A30;--redBg:rgba(216,90,48,0.1);
  --navy:#C9A84C;--navyBg:rgba(201,168,76,0.08);--white:#1E1E18;
  --radius:0px;--radius-sm:0px;
}
/* ===== LAYOUT ===== */
#app{max-width:1280px;margin:0 auto;padding:24px 20px}
.hdr{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;margin-bottom:24px}
.hdr-left{display:flex;align-items:center;gap:20px;flex-wrap:wrap}
.hdr-right{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
/* ===== TABS ===== */
.tab-bar{display:flex;gap:4px;background:var(--card);border:1px solid var(--borderSolid);padding:4px;width:fit-content}
.tab-btn{padding:8px 20px;border:none;background:transparent;font-size:13px;font-weight:700;color:var(--fog);cursor:pointer;transition:all .15s;font-family:'Space Mono',monospace;letter-spacing:.04em}
.tab-btn.active{background:var(--gold);color:var(--void);box-shadow:none}
/* ===== BENCHMARK PROFILE SELECTOR ===== */
.bench-selector{display:flex;gap:3px;background:var(--card);border:1px solid var(--borderSolid);padding:3px}
.bench-btn{padding:6px 14px;border:none;background:transparent;font-size:12px;font-weight:700;color:var(--fog);cursor:pointer;transition:all .15s;font-family:'Space Mono',monospace}
.bench-btn.active{background:var(--gold);color:var(--void)}
/* ===== CARDS ===== */
.card{background:var(--card);border:1px solid var(--borderSolid);padding:20px}
.card-title{font-size:11px;font-weight:700;color:var(--gold);text-transform:uppercase;letter-spacing:.18em;margin-bottom:14px;font-family:'Space Mono',monospace}
.section-gap{margin-bottom:16px}
/* ===== INPUT GRID ===== */
.input-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:12px}
.input-group{display:flex;flex-direction:column;gap:4px}
.input-group label{font-size:11px;font-weight:700;color:var(--gold);text-transform:uppercase;letter-spacing:.14em;font-family:'Space Mono',monospace}
.input-group input,.input-group textarea{
  border:1px solid var(--borderSolid);padding:10px 12px;
  font-size:16px;font-family:'Space Mono',monospace;color:var(--warm);background:var(--void);
  transition:border-color .15s;width:100%
}
.input-group input:focus,.input-group textarea:focus{outline:none;border-color:var(--gold)}
.input-group textarea{resize:vertical;min-height:68px;font-family:'Source Serif 4',serif;font-size:15px;font-style:italic}
.notes-full{grid-column:1/-1}
/* ===== BUTTONS ===== */
.btn{display:inline-flex;align-items:center;gap:6px;padding:12px 22px;border:none;font-size:12px;font-weight:700;cursor:pointer;transition:all .15s;font-family:'Space Mono',monospace;letter-spacing:.1em;text-transform:uppercase}
.btn-primary{background:var(--gold);color:var(--void)}
.btn-primary:hover{background:#b8982f}
.btn-sm{padding:8px 14px;font-size:11px}
.btn-ghost{background:transparent;border:1px solid var(--borderSolid);color:var(--fog)}
.btn-ghost:hover{border-color:var(--goldDim);color:var(--warm)}
.btn-compare{background:var(--goldSub);color:var(--gold);border:1px solid var(--gold)}
.btn-compare.active{background:var(--gold);color:var(--void)}
.btn-print{background:var(--warm);color:var(--void)}
.btn-print:hover{background:#e0dbd3}
.btn-edit{background:transparent;border:1px solid var(--borderSolid);color:var(--fog);padding:6px 10px;font-size:11px;cursor:pointer;font-family:'Space Mono',monospace;letter-spacing:.08em}
.btn-edit:hover{border-color:var(--gold);color:var(--gold)}
.btn-save{background:var(--green);color:var(--void);padding:8px 14px;font-size:11px;border:none;cursor:pointer;font-family:'Space Mono',monospace;font-weight:700}
/* ===== METRIC STRIP ===== */
.metric-strip{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:16px}
.metric-tile{background:var(--card);border:1px solid var(--borderSolid);padding:16px 18px;border-left:2px solid var(--gold)}
.metric-tile .label{font-size:11px;font-weight:700;color:var(--gold);text-transform:uppercase;letter-spacing:.14em;margin-bottom:6px;font-family:'Space Mono',monospace}
.metric-tile .value{font-size:26px;font-weight:700;font-family:'Space Mono',monospace;color:var(--warm)}
.metric-tile .sub{font-size:12px;color:var(--fog);margin-top:4px;font-family:'Source Serif 4',serif;font-style:italic}
/* ===== EFFICIENCY PANEL ===== */
.eff-panel{background:var(--goldSub);border:1px solid var(--goldDim);padding:16px 20px;margin-bottom:16px}
.eff-title{font-size:11px;font-weight:700;color:var(--gold);text-transform:uppercase;letter-spacing:.18em;margin-bottom:12px;font-family:'Space Mono',monospace}
.eff-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:12px}
.eff-item .e-label{font-size:13px;color:var(--fog);font-weight:600;margin-bottom:3px;font-family:'Source Serif 4',serif;font-style:italic}
.eff-item .e-value{font-size:18px;font-weight:700;font-family:'Space Mono',monospace;color:var(--gold)}
/* ===== ISSUE BANNER ===== */
.issue-banner{padding:14px 18px;margin-bottom:16px;display:flex;align-items:flex-start;gap:12px}
.issue-banner.red{background:var(--redBg);border:1px solid rgba(216,90,48,0.3)}
.issue-banner.amber{background:var(--amberBg);border:1px solid rgba(232,147,58,0.3)}
.issue-banner.teal{background:var(--greenBg);border:1px solid rgba(29,158,117,0.3)}
.issue-icon{width:28px;height:28px;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0}
.issue-banner.red .issue-icon{border:2px solid var(--red)}
.issue-banner.amber .issue-icon{border:2px solid var(--amber)}
.issue-banner.teal .issue-icon{border:2px solid var(--green)}
.issue-title{font-size:16px;font-weight:700;margin-bottom:3px;font-family:'Playfair Display',serif}
.issue-banner.red .issue-title{color:var(--red)}
.issue-banner.amber .issue-title{color:var(--amber)}
.issue-banner.teal .issue-title{color:var(--green)}
.issue-desc{font-size:14px;color:var(--fog);font-family:'Source Serif 4',serif;font-style:italic}
/* ===== FUNNEL VIZ ===== */
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px}
@media(max-width:700px){.two-col{grid-template-columns:1fr}}
.funnel-stage{display:flex;align-items:center;gap:8px;margin-bottom:10px}
.funnel-bar-wrap{flex:1;height:28px;background:var(--void);border:1px solid var(--borderSolid);overflow:hidden;position:relative}
.funnel-bar{height:100%;transition:width .3s}
.funnel-label{font-size:11px;font-weight:700;color:var(--fog);width:70px;text-align:right;flex-shrink:0;font-family:'Space Mono',monospace;letter-spacing:.08em;text-transform:uppercase}
.funnel-count{font-size:13px;font-family:'Space Mono',monospace;color:var(--fog);width:55px;flex-shrink:0}
/* ===== CONV TABLE ===== */
.conv-table{width:100%;border-collapse:collapse}
.conv-table th{font-size:11px;font-weight:700;color:var(--gold);text-transform:uppercase;letter-spacing:.14em;padding:8px;text-align:left;border-bottom:1px solid var(--borderSolid);font-family:'Space Mono',monospace}
.conv-table td{padding:10px 8px;border-bottom:1px solid var(--border);font-size:14px;vertical-align:middle;color:var(--warm)}
.conv-table tr:last-child td{border-bottom:none}
.rate-pill{display:inline-block;padding:4px 10px;font-family:'Space Mono',monospace;font-size:13px;font-weight:700}
.pill-good{background:var(--greenBg);color:var(--green)}
.pill-ok{background:var(--amberBg);color:var(--amber)}
.pill-bad{background:var(--redBg);color:var(--red)}
.bench-range{font-size:12px;font-family:'Space Mono',monospace;color:var(--fog)}
/* ===== WHAT-IF RANKING ===== */
.whatif-row{display:grid;grid-template-columns:1fr auto auto auto;gap:10px;align-items:center;padding:12px;border-bottom:1px solid var(--border)}
.whatif-row:last-child{border-bottom:none}
.whatif-rank{width:22px;height:22px;background:var(--gold);color:var(--void);font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.whatif-stage{font-size:14px;font-weight:700;font-family:'Playfair Display',serif;color:var(--warm)}
.whatif-rates{font-size:12px;font-family:'Space Mono',monospace;color:var(--fog)}
.whatif-stat{text-align:right}
.whatif-stat .ws-val{font-size:15px;font-weight:700;font-family:'Space Mono',monospace}
.whatif-stat .ws-label{font-size:10px;color:var(--fog);text-transform:uppercase;letter-spacing:.08em;font-family:'Space Mono',monospace}
/* ===== DIAGNOSTIC ACCORDION ===== */
.diag-card{background:var(--card);border:1px solid var(--borderSolid);overflow:hidden;margin-bottom:12px}
.diag-header{display:flex;align-items:center;justify-content:space-between;padding:14px 18px;cursor:pointer;user-select:none;gap:10px}
.diag-header:hover{background:rgba(201,168,76,0.04)}
.diag-header-left{display:flex;align-items:center;gap:10px;flex:1;min-width:0}
.diag-badge{padding:5px 12px;font-size:13px;font-weight:700;font-family:'Space Mono',monospace}
.diag-body{padding:0 18px 18px;border-top:1px solid var(--border);display:none}
.diag-body.open{display:block}
.diag-section-title{font-size:11px;font-weight:700;color:var(--gold);text-transform:uppercase;letter-spacing:.18em;margin:14px 0 8px;font-family:'Space Mono',monospace}
.diag-list{list-style:none;display:flex;flex-direction:column;gap:5px}
.diag-list li{font-size:14px;color:var(--warm);padding-left:16px;position:relative;font-family:'Source Serif 4',serif;line-height:1.5}
.diag-list li::before{content:'\2022';position:absolute;left:0;color:var(--gold)}
.mini-chart{display:inline-block}
/* ===== TRENDS TAB ===== */
.trends-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.q-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:16px}
@media(max-width:800px){.q-grid{grid-template-columns:repeat(2,1fr)}}
.q-card{background:var(--card);border:1px solid var(--borderSolid);padding:16px;position:relative}
.q-card-active{border-color:var(--gold)}
.q-card .q-label{font-size:11px;font-weight:700;color:var(--gold);text-transform:uppercase;letter-spacing:.18em;font-family:'Space Mono',monospace}
.q-card .q-score{font-size:32px;font-weight:700;font-family:'Space Mono',monospace}
.q-card .q-rev{font-size:13px;font-family:'Space Mono',monospace;color:var(--fog);margin-top:4px}
.q-card .q-notes{font-size:13px;color:var(--fog);margin-top:6px;font-style:italic;border-top:1px solid var(--border);padding-top:6px;line-height:1.5;font-family:'Source Serif 4',serif}
.q-empty{opacity:.4;pointer-events:none}
.q-card-footer{display:flex;justify-content:space-between;align-items:center;margin-top:12px;gap:6px}
.notes-edit-row{display:flex;gap:6px;align-items:flex-start;margin-top:8px}
.notes-edit-row textarea{flex:1;font-size:14px;border:1px solid var(--gold);padding:8px 10px;resize:vertical;min-height:52px;font-family:'Source Serif 4',serif;font-style:italic;background:var(--void);color:var(--warm)}
/* ===== COMPARISON DRAWER ===== */
.compare-drawer{background:var(--card);border:2px solid var(--gold);padding:20px;margin-bottom:16px}
.compare-title{font-size:14px;font-weight:700;color:var(--gold);margin-bottom:16px;font-family:'Playfair Display',serif}
.compare-grid{display:grid;grid-template-columns:1fr auto 1fr;gap:0;align-items:start}
.compare-col{padding:0 16px}
.compare-divider{width:1px;background:var(--borderSolid);align-self:stretch;margin:0 4px}
.compare-row{display:grid;grid-template-columns:1fr auto 1fr;gap:8px;align-items:center;padding:6px 0;border-bottom:1px solid var(--border)}
.compare-row:last-child{border-bottom:none}
.compare-row.header-row{border-bottom:1px solid var(--borderSolid)}
.cmp-label{font-size:11px;font-weight:700;color:var(--gold);text-transform:uppercase;text-align:center;margin-bottom:4px;letter-spacing:.14em;font-family:'Space Mono',monospace}
.cmp-val{font-size:15px;font-family:'Space Mono',monospace;font-weight:700;text-align:center;color:var(--warm)}
.cmp-delta{font-size:13px;font-weight:700;font-family:'Space Mono',monospace;text-align:center;min-width:60px}
.delta-up{color:var(--green)}
.delta-down{color:var(--red)}
.delta-zero{color:var(--fog)}
.cmp-row-label{font-size:13px;font-weight:600;color:var(--fog);grid-column:2;text-align:center}
.compare-section-hdr{font-size:11px;font-weight:700;color:var(--gold);text-transform:uppercase;letter-spacing:.14em;padding:10px 0 4px;border-top:1px solid var(--goldDim);margin-top:6px;font-family:'Space Mono',monospace}
/* ===== TIMELINE ===== */
.timeline-row{display:flex;gap:12px;align-items:flex-start;padding:12px 0;border-bottom:1px solid var(--border)}
.timeline-row:last-child{border-bottom:none}
.tl-quarter{width:36px;font-size:13px;font-weight:700;color:var(--fog);flex-shrink:0;padding-top:4px;font-family:'Space Mono',monospace}
.tl-bar-wrap{flex:1}
.tl-bar{height:28px;display:flex;align-items:center;padding:0 8px;font-size:13px;font-weight:700;color:var(--void);font-family:'Space Mono',monospace;transition:width .4s;white-space:nowrap;overflow:hidden}
.tl-notes{font-size:13px;color:var(--fog);margin-top:4px;font-style:italic;display:flex;align-items:center;gap:6px;font-family:'Source Serif 4',serif}
/* ===== TRENDS TABLE ===== */
.trends-table{width:100%;border-collapse:collapse}
.trends-table th{font-size:11px;font-weight:700;color:var(--gold);text-transform:uppercase;letter-spacing:.14em;padding:8px 10px;text-align:right;border-bottom:1px solid var(--borderSolid);font-family:'Space Mono',monospace}
.trends-table th:first-child{text-align:left}
.trends-table td{padding:10px;border-bottom:1px solid var(--border);font-size:14px;font-family:'Space Mono',monospace;text-align:right;color:var(--warm)}
.trends-table td:first-child{text-align:left;font-family:'Playfair Display',serif;font-weight:700}
.trends-table tr:last-child td{border-bottom:none}
/* ===== HEALTH SCORE COLOR ===== */
.score-good{color:var(--green)}
.score-ok{color:var(--amber)}
.score-bad{color:var(--red)}
/* ===== CREDIT ===== */
.credit{text-align:center;padding:24px;font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:var(--fog);font-family:'Space Mono',monospace}
.credit a{color:var(--goldDim);text-decoration:none}
.credit a:hover{color:var(--gold)}
/* ===== MISC ===== */
.empty-state{text-align:center;padding:40px;color:var(--fog);font-size:14px;font-family:'Source Serif 4',serif;font-style:italic}
.tag-q{display:inline-block;background:var(--goldSub);border:1px solid var(--goldDim);font-size:11px;font-weight:700;padding:3px 8px;color:var(--gold);font-family:'Space Mono',monospace;letter-spacing:.08em}
.hidden{display:none!important}
.mb8{margin-bottom:8px}
.mb16{margin-bottom:16px}
.mt12{margin-top:12px}
.flex-row{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
.sep{color:var(--borderSolid)}
.w-full{width:100%}
@media(max-width:900px){.metric-strip{grid-template-columns:repeat(2,1fr)}}
/* ===== MOBILE ===== */
@media(max-width:600px){
  #app{padding:16px 12px}
  .hdr{flex-direction:column;align-items:flex-start;gap:12px}
  .hdr-left{flex-direction:column;align-items:flex-start;gap:10px;width:100%}
  .hdr-right{width:100%}
  .tab-bar{width:100%}
  .tab-btn{flex:1;text-align:center;padding:10px 12px;font-size:13px}
  .bench-selector{width:100%}
  .bench-btn{flex:1;text-align:center;padding:8px 8px;font-size:11px}
  .metric-strip{grid-template-columns:1fr 1fr;gap:8px}
  .metric-tile{padding:12px 14px}
  .metric-tile .value{font-size:22px}
  .two-col{grid-template-columns:1fr;gap:12px}
  .input-grid{grid-template-columns:1fr 1fr;gap:10px}
  .card{padding:16px 14px}
  .whatif-row{grid-template-columns:1fr;gap:6px;padding:14px 12px}
  .whatif-row > div:first-child{display:flex;align-items:center;gap:8px}
  .whatif-row .whatif-stat{text-align:left;display:inline-flex;gap:6px;align-items:baseline}
  .diag-header{padding:12px 14px;flex-wrap:wrap}
  .diag-header-left{flex-wrap:wrap;gap:6px}
  .diag-body{padding:0 14px 14px}
  .q-grid{grid-template-columns:1fr 1fr;gap:8px}
  .compare-row{gap:4px}
  .cmp-val{font-size:13px}
  .cmp-delta{font-size:11px;min-width:auto}
  .eff-grid{grid-template-columns:1fr 1fr;gap:10px}
  .funnel-bar-wrap{height:24px}
  .credit{padding:16px 8px;font-size:10px;letter-spacing:.12em}
}
@media(max-width:380px){
  .metric-strip{grid-template-columns:1fr}
  .input-grid{grid-template-columns:1fr}
  .q-grid{grid-template-columns:1fr}
  .eff-grid{grid-template-columns:1fr}
  .tab-btn{font-size:12px;padding:10px 8px}
}
</style>
</head>
<body>
<div id="app"></div>
<script>
// ===== BRAND COLORS =====
const B = {
  ink:"#F5F0E8", void:"#141410", card:"#1E1E18", border:"#2A2A22",
  fog:"#6B6B5E", gold:"#C9A84C", goldDim:"rgba(201,168,76,0.3)", goldSub:"rgba(201,168,76,0.08)",
  warm:"#F5F0E8", green:"#1D9E75", greenBg:"rgba(29,158,117,0.1)",
  amber:"#E8933A", amberBg:"rgba(232,147,58,0.1)", red:"#D85A30", redBg:"rgba(216,90,48,0.1)",
  white:"#1E1E18"
};
// ===== BENCHMARK PROFILES =====
const BENCH_PROFILES = {
  smb: {
    v_l: {low:2,   mid:4,   high:6},
    l_m: {low:20,  mid:30,  high:45},
    m_s: {low:25,  mid:35,  high:50},
    s_o: {low:45,  mid:55,  high:70},
    o_w: {low:20,  mid:28,  high:40}
  },
  midmarket: {
    v_l: {low:1,   mid:2.5, high:5},
    l_m: {low:15,  mid:25,  high:40},
    m_s: {low:20,  mid:30,  high:50},
    s_o: {low:40,  mid:55,  high:70},
    o_w: {low:15,  mid:20,  high:35}
  },
  enterprise: {
    v_l: {low:0.5, mid:1,   high:2},
    l_m: {low:10,  mid:15,  high:25},
    m_s: {low:15,  mid:25,  high:35},
    s_o: {low:35,  mid:50,  high:65},
    o_w: {low:10,  mid:18,  high:25}
  }
};
// ===== CONVERSION STAGE DEFINITIONS =====
const CONVS = [
  {
    id:'v_l', from:'visitors', to:'leads',
    label:'Capture Rate', short:'Capture',
    failureLabel:'Poor visitor capture',
    failureDesc:'Your site converts visitors to leads far below benchmark, meaning most demand evaporates before it enters the pipeline.',
    rootCauses:[
      'CTA placement or messaging is misaligned with visitor intent',
      'Landing pages lack specific value propositions for each persona',
      'Form friction is too high — too many fields or gated content mismatch',
      'Traffic sources are untargeted or bring low-intent visitors',
      'No progressive profiling or exit-intent capture in place'
    ],
    questions:[
      'What is the primary CTA above the fold for your highest-traffic page?',
      'Which traffic sources drive the highest lead conversion rate?',
      'How many fields are on your primary lead capture form?',
      'Are landing pages personalised by campaign or persona?',
      'What percentage of visitors reach a lead-capture page at all?'
    ],
    actions:[
      'Run A/B tests on hero CTA copy and placement targeting top 3 intent signals',
      'Reduce primary form to 3-4 fields; move enrichment to post-conversion',
      'Create dedicated landing pages per high-volume campaign or ICP segment',
      'Implement exit-intent overlays with content offers tied to page context',
      'Audit traffic quality — pause or optimise channels with <1% lead rate'
    ],
    impact:'Each 1pp improvement in capture rate adds significant lead volume with no increase in ad spend.'
  },
  {
    id:'l_m', from:'leads', to:'mqls',
    label:'Lead Quality', short:'Lead Qual',
    failureLabel:'Low lead quality',
    failureDesc:'Less than the benchmark proportion of leads reach MQL status, indicating your captured leads are poorly qualified or scoring models are mis-calibrated.',

  currentQ: "Q1",

// ===== PERSISTENCE =====
const STORAGE_KEY = "pipeline_fitness_q26_v2";
function saveState(){
  try {

      drafts: state.drafts,
      quarters: state.quarters,
      currentQ: state.currentQ,

    if(saved.compareKeys) state.compareKeys = saved.compareKeys;
  } catch(e){}
}
// ===== BENCHMARK HELPERS =====
function getBench(convId){
  return BENCH_PROFILES[state.benchProfile][convId];
}
function rateStatus(rate, bench){
  if(rate >= bench.high) return "good";
  if(rate >= bench.mid)  return "ok";
  if(rate >= bench.low)  return "low";
  return "bad";
}
function statusLabel(s){
  if(s==="good") return "Above benchmark";
  if(s==="ok")   return "At benchmark";
  if(s==="low")  return "Below benchmark";
  return "Well below benchmark";
}
// ===== COMPUTE CONVERSIONS =====
function computeConvsFrom(d){
  const pairs = [
    {id:"v_l", num:d.leads,   den:d.visitors},
    {id:"l_m", num:d.mqls,    den:d.leads},
    {id:"m_s", num:d.sqls,    den:d.mqls},
    {id:"s_o", num:d.opps,    den:d.sqls},
    {id:"o_w", num:d.won,     den:d.opps}
  ];
  return pairs.map(p => {
    const conv = CONVS.find(c => c.id === p.id);
    const bench = getBench(p.id);
    const rate = p.den > 0 ? (p.num / p.den) * 100 : 0;
    const status = rateStatus(rate, bench);
    const deficit = Math.max(0, bench.mid - rate);
    return { ...conv, rate, bench, status, deficit };
  });
}
function computeConvs(){
  return computeConvsFrom(state.drafts[state.currentQ]);
}
// ===== DETECT PRIMARY ISSUE =====
function detectPrimary(convs){
  return convs.reduce((a,b) => b.deficit > a.deficit ? b : a, convs[0]);
}
// ===== HEALTH SCORE =====
function healthScore(convs){
  const weights = {v_l:20,l_m:20,m_s:20,s_o:20,o_w:20};
  let score = 0;
  convs.forEach(c => {
    const w = weights[c.id];
    if(c.status==="good")      score += w;
    else if(c.status==="ok")   score += w * 0.75;
    else if(c.status==="low")  score += w * 0.40;
    else                       score += 0;
  });
  return Math.round(score);
}
// ===== ALL WHAT-IFS =====
function allWhatIfs(convs){
  const d = state.drafts[state.currentQ];
  const results = [];
  convs.forEach(c => {
    if(c.deficit <= 0) return;
    const benchMid = c.bench.mid / 100;
    let projWon = d.won;
    if(c.id === 'v_l'){
      const projLeads = d.visitors * benchMid;
      const lm = d.leads > 0 ? d.mqls/d.leads : 0;
      const ms = d.mqls > 0 ? d.sqls/d.mqls : 0;
      const so = d.sqls > 0 ? d.opps/d.sqls : 0;
      const ow = d.opps > 0 ? d.won/d.opps : 0;
      projWon = projLeads * lm * ms * so * ow;
    } else if(c.id === 'l_m'){
      const projMqls = d.leads * benchMid;
      const ms = d.mqls > 0 ? d.sqls/d.mqls : 0;
      const so = d.sqls > 0 ? d.opps/d.sqls : 0;
      const ow = d.opps > 0 ? d.won/d.opps : 0;
      projWon = projMqls * ms * so * ow;
    } else if(c.id === 'm_s'){
      const projSqls = d.mqls * benchMid;
      const so = d.sqls > 0 ? d.opps/d.sqls : 0;
      const ow = d.opps > 0 ? d.won/d.opps : 0;
      projWon = projSqls * so * ow;
    } else if(c.id === 's_o'){
      const projOpps = d.sqls * benchMid;
      const ow = d.opps > 0 ? d.won/d.opps : 0;
      projWon = projOpps * ow;
    } else if(c.id === 'o_w'){
      projWon = d.opps * benchMid;
    }
    const uplift = projWon - d.won;
    const addedRev = uplift * d.asp;
    results.push({
      id: c.id, label: c.label, short: c.short,
      currentRate: c.rate, benchMidRate: c.bench.mid,
      projectedWon: projWon, uplift, addedRev
    });
  });
  results.sort((a,b) => b.uplift - a.uplift);
  return results;
}
// ===== EFFICIENCY METRICS =====
function effMetrics(d){
  if(!d.spend || d.spend <= 0) return null;
  const cpl     = d.leads  > 0 ? d.spend / d.leads  : null;
  const cpMql   = d.mqls   > 0 ? d.spend / d.mqls   : null;
  const cac     = d.won    > 0 ? d.spend / d.won     : null;
  const pipeROI = d.spend  > 0 && d.opps > 0 ? (d.opps * d.asp) / d.spend : null;
  const revROI  = d.spend  > 0 && d.won  > 0 ? (d.won  * d.asp) / d.spend : null;
  return {cpl, cpMql, cac, pipeROI, revROI};
}

// ===== FORMAT HELPERS =====
function fmtN(n){ if(n===null||n===undefined) return "--"; return Number(n).toLocaleString(); }
function fmtRate(r){ if(r===null||r===undefined) return "--"; return r.toFixed(1)+"%"; }
function fmtDollar(n){ if(n===null||n===undefined) return "--"; if(n>=1000000) return "$"+(n/1000000).toFixed(1)+"M"; if(n>=1000) return "$"+(n/1000).toFixed(0)+"K"; return "$"+Math.round(n); }
function fmtROI(n){ if(n===null||n===undefined) return "--"; return n.toFixed(1)+"x"; }
function truncate(s, len){ if(!s) return ""; return s.length > len ? s.substring(0,len)+"..." : s; }
function scoreColor(s){ if(s>=70) return B.green; if(s>=45) return B.amber; return B.red; }
function scoreClass(s){ if(s>=70) return "score-good"; if(s>=45) return "score-ok"; return "score-bad"; }
function pillClass(status){ if(status==="good") return "pill-good"; if(status==="ok") return "pill-ok"; return "pill-bad"; }
function issueClass(status){ if(status==="good"||status==="ok") return "teal"; if(status==="low") return "amber"; return "red"; }
// ===== DELTA HELPER =====
function deltaHtml(vNew, vOld, type){
  if(vNew===null||vNew===undefined||vOld===null||vOld===undefined) return '<span class="delta-zero cmp-delta">\u2014</span>';
  const diff = vNew - vOld;
  if(Math.abs(diff) < 0.001) return '<span class="delta-zero cmp-delta">\u2014</span>';
  const up = diff > 0;
  const cls = up ? "delta-up" : "delta-down";
  const arrow = up ? "\u2191" : "\u2193";
  let formatted;
  if(type==="pct") formatted = arrow+" "+Math.abs(diff).toFixed(1)+"pp";
  else if(type==="dollar") formatted = arrow+" "+fmtDollar(Math.abs(diff));
  else formatted = arrow+" "+fmtN(Math.abs(diff));
  return '<span class="'+cls+' cmp-delta">'+formatted+'</span>';
}
// ===== MINI BAR CHART =====
function miniBarChart(values, benchPct, max){
  const W=80, H=28, barW=14, gap=4;
  const colors = [B.green, B.amber, B.gold, B.red];
  const totalBars = values.length;
  const startX = (W - totalBars*(barW+gap) + gap) / 2;
  let bars = "";
  values.forEach((v,i) => {
    if(v === null || v === undefined){
      bars += '<rect x="'+(startX+i*(barW+gap))+'" y="'+(H-4)+'" width="'+barW+'" height="4" fill="'+B.fog+'" rx="0"/>';
      return;
    }
    const normMax = max || Math.max(...values.filter(x=>x!==null)) || 1;
    const barH = Math.max(3, Math.round((v/normMax)*(H-2)));
    const color = colors[i % colors.length];
    bars += '<rect x="'+(startX+i*(barW+gap))+'" y="'+(H-barH)+'" width="'+barW+'" height="'+barH+'" fill="'+color+'" rx="0"/>';
  });
  let benchLine = "";
  if(benchPct !== null && benchPct !== undefined && max){
    const benchY = H - Math.round((benchPct/100)*H);
    const safeY = Math.max(1, Math.min(H-1, benchY));
    benchLine = '<line x1="0" y1="'+safeY+'" x2="'+W+'" y2="'+safeY+'" stroke="'+B.fog+'" stroke-width="1" stroke-dasharray="3,2"/>';
  }
  return '<svg width="'+W+'" height="'+H+'" class="mini-chart">'+benchLine+bars+'</svg>';
}

  let effPanel = "";
  if(eff){
    effPanel = '<div class="eff-panel"><div class="eff-title">Marketing Spend Efficiency \u2014 '+fmtDollar(d.spend)+' invested</div><div class="eff-grid"><div class="eff-item"><div class="e-label">Cost per Lead</div><div class="e-value">'+fmtDollar(eff.cpl)+'</div></div><div class="eff-item"><div class="e-label">Cost per MQL</div><div class="e-value">'+fmtDollar(eff.cpMql)+'</div></div><div class="eff-item"><div class="e-label">CAC</div><div class="e-value">'+fmtDollar(eff.cac)+'</div></div><div class="eff-item"><div class="e-label">Pipeline ROI</div><div class="e-value">'+fmtROI(eff.pipeROI)+'</div></div><div class="eff-item"><div class="e-label">Revenue ROI</div><div class="e-value">'+fmtROI(eff.revROI)+'</div></div></div></div>';
  }
  const issC = primary.deficit > 0 ? (primary.status==="bad"?"red":primary.status==="low"?"amber":"teal") : "teal";
  const issIcon = issC==="red"?"\u26A0":issC==="amber"?"\u25CF":"\u2713";
  const issueBanner = '<div class="issue-banner '+issC+'"><div class="issue-icon">'+issIcon+'</div><div><div class="issue-title">'+(primary.deficit > 0 ? "Primary issue: "+primary.failureLabel : "Pipeline performing at or above benchmark")+'</div><div class="issue-desc">'+(primary.deficit > 0 ? primary.failureDesc : "All stages are tracking well against benchmark. Keep monitoring for regression.")+'</div></div></div>';
  const stages = ['visitors','leads','mqls','sqls','opps','won'];
  const maxVol = d.visitors || 1;
  const funnelBars = stages.map(s => {
    const val = d[s];
    const pct = Math.max(2, Math.round((val/maxVol)*100));
    const colors = {visitors:B.gold,leads:B.green,mqls:B.amber,sqls:B.gold,opps:B.red,won:B.fog};
    const labels = {visitors:"Visitors",leads:"Leads",mqls:"MQLs",sqls:"SQLs",opps:"Opps",won:"Won"};
    return '<div class="funnel-stage"><div class="funnel-label">'+labels[s]+'</div><div class="funnel-bar-wrap"><div class="funnel-bar" style="width:'+pct+'%;background:'+colors[s]+'"></div></div><div class="funnel-count">'+fmtN(val)+'</div></div>';
  }).join("");
  const convRows = convs.map(c => {
    const status = c.status;
    const pClass = pillClass(status);
    const statusText = status==="good"?"\u2191 Good":status==="ok"?"\u2192 OK":status==="low"?"\u2193 Low":"\u2193\u2193 Critical";
    return '<tr><td style="font-weight:700;font-family:Playfair Display,serif">'+c.label+'</td><td><span class="rate-pill '+pClass+'">'+fmtRate(c.rate)+'</span></td><td class="bench-range">'+c.bench.low+'\u2013'+c.bench.high+'%</td><td style="font-size:12px;color:'+(status==="good"?B.green:status==="ok"?B.amber:B.red)+';font-weight:700">'+statusText+'</td></tr>';
  }).join("");
  let whatifHtml = "";
  if(whatifs.length > 0){
    const rows = whatifs.map((w,i) => '<div class="whatif-row"><div style="display:flex;align-items:center;gap:8px"><div class="whatif-rank">'+(i+1)+'</div><div><div class="whatif-stage">'+w.label+'</div><div class="whatif-rates">'+fmtRate(w.currentRate)+' \u2192 '+w.benchMidRate+'% (benchmark mid)</div></div></div><div class="whatif-stat"><div class="ws-val" style="color:'+B.green+'">'+w.projectedWon.toFixed(1)+'</div><div class="ws-label">proj. won</div></div><div class="whatif-stat"><div class="ws-val" style="color:'+B.gold+'">+'+w.uplift.toFixed(1)+'</div><div class="ws-label">uplift</div></div><div class="whatif-stat"><div class="ws-val" style="color:'+B.warm+'">'+fmtDollar(w.addedRev)+'</div><div class="ws-label">added ARR</div></div></div>').join("");
    whatifHtml = '<div class="card section-gap"><div class="card-title">Stage Improvement Ranking \u2014 fix to benchmark midpoint</div><p style="font-size:12px;color:var(--fog);margin-bottom:12px;font-family:Source Serif 4,serif;font-style:italic">If each stage were brought to benchmark midpoint independently, ranked by customer uplift.</p>'+rows+'</div>';
  } else {
    whatifHtml = '<div class="card section-gap"><div class="card-title">Stage Improvement Ranking</div><div class="empty-state" style="padding:20px">All stages at or above benchmark midpoint \u2014 nothing to rank.</div></div>';
  }
  const pDiag = primary;
  const diagHtml = '<div class="card section-gap"><div class="card-title">Primary Diagnostic \u2014 '+pDiag.label+'</div><div style="margin-bottom:14px"><span class="rate-pill '+pillClass(pDiag.status)+'" style="margin-right:8px">'+fmtRate(pDiag.rate)+'</span><span class="bench-range">benchmark: '+pDiag.bench.low+'\u2013'+pDiag.bench.high+'%</span><span style="margin-left:8px;font-size:12px;color:var(--fog)">'+pDiag.from+' \u2192 '+pDiag.to+'</span></div><div class="diag-section-title">Root Causes</div><ul class="diag-list">'+pDiag.rootCauses.map(r=>'<li>'+r+'</li>').join("")+'</ul><div class="diag-section-title">Diagnostic Questions</div><ul class="diag-list">'+pDiag.questions.map(q=>'<li>'+q+'</li>').join("")+'</ul><div class="diag-section-title">Recommended Actions</div><ul class="diag-list">'+pDiag.actions.map(a=>'<li>'+a+'</li>').join("")+'</ul></div>';
  const accordionItems = convs.map(c => {
    const bStyle = c.status==="good"?'background:'+B.greenBg+';color:'+B.green:c.status==="ok"?'background:'+B.amberBg+';color:'+B.amber:'background:'+B.redBg+';color:'+B.red;
    return '<div class="diag-card"><div class="diag-header" data-action="toggle-diag" data-id="'+c.id+'"><div class="diag-header-left"><span class="diag-badge" style="'+bStyle+'">'+fmtRate(c.rate)+'</span><span style="font-weight:700;font-size:14px;font-family:Playfair Display,serif;color:var(--warm)">'+c.label+'</span><span style="font-size:12px;color:var(--fog)">'+c.from+' \u2192 '+c.to+'</span></div><span style="font-size:12px;color:var(--fog);flex-shrink:0">Bench: '+c.bench.low+'\u2013'+c.bench.high+'% \u25BE</span></div><div class="diag-body" id="diag-'+c.id+'"><div class="diag-section-title">Root Causes</div><ul class="diag-list">'+c.rootCauses.map(r=>'<li>'+r+'</li>').join("")+'</ul><div class="diag-section-title">Diagnostic Questions</div><ul class="diag-list">'+c.questions.map(q=>'<li>'+q+'</li>').join("")+'</ul><div class="diag-section-title">Recommended Actions</div><ul class="diag-list">'+c.actions.map(a=>'<li>'+a+'</li>').join("")+'</ul><div class="diag-section-title">Why It Matters</div><p style="font-size:13px;color:var(--fog);line-height:1.6;font-family:Source Serif 4,serif;font-style:italic">'+c.impact+'</p></div></div>';
  }).join("");
  return metricStrip+effPanel+issueBanner+'<div class="two-col"><div class="card"><div class="card-title">Funnel Volume</div>'+funnelBars+'</div><div class="card"><div class="card-title">Conversion Rates</div><table class="conv-table"><thead><tr><th>Stage</th><th>Rate</th><th>Benchmark</th><th>Status</th></tr></thead><tbody>'+convRows+'</tbody></table></div></div>'+whatifHtml+diagHtml+'<div class="card section-gap"><div class="card-title">All Stage Diagnostics</div>'+accordionItems+'</div>';
}
// ===== RENDER TRENDS TAB =====
function renderTrends(){
  const qKeys = ["Q1","Q2","Q3","Q4"];
  const qCards = qKeys.map(qk => {
    const snap = state.quarters[qk];
    const isActive = qk === state.currentQ;
    const isCompared = state.compareKeys.includes(qk);
    const isEditing = state.editingNotes === qk;
    if(!snap){
      return '<div class="q-card q-empty"><div class="q-label">'+qk+'</div><div style="font-size:13px;color:var(--fog);margin-top:8px;font-family:Source Serif 4,serif;font-style:italic">Not submitted</div></div>';
    }
    const scoreCol = scoreColor(snap.healthScore);
    const scoreTextCls = scoreClass(snap.healthScore);
    const cmpBtnCls = isCompared ? "btn-compare active" : "btn-compare";
    let notesSection = "";
    if(isEditing){
      notesSection = '<div class="notes-edit-row"><textarea id="notes-edit-'+qk+'" rows="3" placeholder="Add quarter notes...">'+( snap.notes||"")+'</textarea><div style="display:flex;flex-direction:column;gap:4px"><button class="btn-save" data-action="save-notes" data-key="'+qk+'">Save</button><button class="btn-edit" data-action="cancel-notes-edit">Cancel</button></div></div>';
    } else {
      const notesText = snap.notes ? truncate(snap.notes, 80) : "";
      notesSection = '<div class="q-notes">'+(notesText || '<em style="color:var(--fog)">No notes</em>')+'</div>';
    }
    return '<div class="q-card'+(isActive?" q-card-active":"")+'"><div style="display:flex;justify-content:space-between;align-items:center"><div class="q-label">'+qk+'</div><button class="btn btn-edit btn-sm" data-action="edit-notes" data-key="'+qk+'">Edit</button></div><div class="q-score '+scoreTextCls+'" style="color:'+scoreCol+'">'+snap.healthScore+'</div><div class="q-rev">'+fmtDollar(snap.revenue)+' revenue</div><div style="font-size:11px;color:var(--fog);margin-top:2px">'+fmtN(snap.data.won)+' won \u00B7 '+fmtN(snap.data.opps)+' opps</div>'+notesSection+'<div class="q-card-footer"><button class="btn btn-sm '+cmpBtnCls+'" data-action="toggle-compare" data-key="'+qk+'">'+(isCompared ? "Comparing" : "Compare")+'</button><button class="btn btn-sm btn-ghost" data-action="print-quarter" data-key="'+qk+'">Print</button></div></div>';
  }).join("");
  let compareDrawer = "";
  if(state.compareKeys.length === 2){
    const ka = state.compareKeys[0], kb = state.compareKeys[1];
    const sa = state.quarters[ka], sb = state.quarters[kb];
    if(sa && sb){
      const makeRow = function(label, vA, vB, type){
        const fmtFn = type==="dollar" ? fmtDollar : type==="pct" ? fmtRate : fmtN;
        return '<div class="compare-row"><div class="cmp-val">'+fmtFn(vA)+'</div><div style="display:flex;flex-direction:column;align-items:center;gap:2px"><div class="cmp-row-label">'+label+'</div>'+deltaHtml(vB, vA, type)+'</div><div class="cmp-val">'+fmtFn(vB)+'</div></div>';
      };
      const scoreRow = '<div class="compare-row"><div class="cmp-val '+scoreClass(sa.healthScore)+'" style="color:'+scoreColor(sa.healthScore)+'">'+sa.healthScore+'</div><div style="display:flex;flex-direction:column;align-items:center;gap:2px"><div class="cmp-row-label">Health Score</div>'+deltaHtml(sb.healthScore, sa.healthScore, "count")+'</div><div class="cmp-val '+scoreClass(sb.healthScore)+'" style="color:'+scoreColor(sb.healthScore)+'">'+sb.healthScore+'</div></div>';
      const volRows = [['Visitors','visitors','count'],['Leads','leads','count'],['MQLs','mqls','count'],['SQLs','sqls','count'],['Opps','opps','count'],['Won','won','count'],['Revenue','revenue','dollar']].map(function(arr){
        const lbl=arr[0],key=arr[1],type=arr[2];
        const vA = key==='revenue' ? sa.revenue : sa.data[key];
        const vB = key==='revenue' ? sb.revenue : sb.data[key];
        return makeRow(lbl, vA, vB, type);
      }).join("");
      const convRows2 = CONVS.map(function(c){
        return makeRow(c.short, sa.rates[c.id], sb.rates[c.id], "pct");
      }).join("");
      compareDrawer = '<div class="compare-drawer"><div class="compare-title">Comparing '+ka+' vs '+kb+'</div><div style="display:grid;grid-template-columns:1fr auto 1fr;text-align:center;margin-bottom:12px"><div class="cmp-label">'+ka+'</div><div></div><div class="cmp-label">'+kb+'</div></div>'+scoreRow+'<div class="compare-section-hdr">Volume Metrics</div>'+volRows+'<div class="compare-section-hdr">Conversion Rates</div>'+convRows2+'</div>';
    }
  }
  const submittedKeys = qKeys.filter(function(k){ return state.quarters[k]; });
  let timelineHtml = "";
  if(submittedKeys.length > 0){
    const rows = qKeys.map(function(qk){
      const snap = state.quarters[qk];
      if(!snap) return '<div class="timeline-row"><div class="tl-quarter">'+qk+'</div><div class="tl-bar-wrap"><div style="font-size:11px;color:var(--fog);padding:6px 0">\u2014</div></div></div>';
      const barW = Math.max(4, snap.healthScore);
      const barCol = scoreColor(snap.healthScore);
      const isEditing = state.editingNotes === qk;
      const notesText = snap.notes ? truncate(snap.notes, 80) : "";
      let notesDisplay = "";
      if(isEditing){
        notesDisplay = '<div class="notes-edit-row" style="margin-top:6px"><textarea id="tl-notes-edit-'+qk+'" rows="2" placeholder="Add notes...">'+(snap.notes||"")+'</textarea><div style="display:flex;gap:4px"><button class="btn-save" data-action="save-notes" data-key="'+qk+'">Save</button><button class="btn-edit" data-action="cancel-notes-edit">Cancel</button></div></div>';
      } else {
        notesDisplay = '<div class="tl-notes"><span>'+(notesText || '<em style="color:var(--fog)">No notes</em>')+'</span><button class="btn-edit" data-action="edit-notes" data-key="'+qk+'">Edit</button></div>';
      }
      return '<div class="timeline-row"><div class="tl-quarter">'+qk+'</div><div class="tl-bar-wrap"><div class="tl-bar" style="width:'+barW+'%;background:'+barCol+';max-width:100%">'+snap.healthScore+'</div>'+notesDisplay+'</div></div>';
    }).join("");
    timelineHtml = '<div class="card section-gap"><div class="card-title">Health Score Timeline</div>'+rows+'</div>';
  }
  const convTrendHeader = '<tr><th>Stage</th>'+qKeys.map(function(k){return '<th>'+k+'</th>';}).join("")+'</tr>';
  const convTrendRows = CONVS.map(function(c){
    const cells = qKeys.map(function(k){
      const snap = state.quarters[k];
      if(!snap) return '<td style="color:var(--fog)">\u2014</td>';
      return '<td><span class="rate-pill '+pillClass(snap.statuses[c.id])+'">'+fmtRate(snap.rates[c.id])+'</span></td>';
    }).join("");
    return '<tr><td>'+c.label+'</td>'+cells+'</tr>';
  }).join("");
  const volKeys = ['visitors','leads','mqls','sqls','opps','won'];
  const volLabels = {visitors:'Visitors',leads:'Leads',mqls:'MQLs',sqls:'SQLs',opps:'Opps',won:'Won'};
  const volTrendHeader = '<tr><th>Metric</th>'+qKeys.map(function(k){return '<th>'+k+'</th>';}).join("")+'</tr>';
  const volTrendRows = volKeys.map(function(vk){
    const cells = qKeys.map(function(k){
      const snap = state.quarters[k];
      if(!snap) return '<td style="color:var(--fog)">\u2014</td>';
      return '<td>'+fmtN(snap.data[vk])+'</td>';
    }).join("");
    return '<tr><td>'+volLabels[vk]+'</td>'+cells+'</tr>';
  }).join("");
  const trendsTablesHtml = submittedKeys.length > 0 ? '<div class="card section-gap"><div class="card-title">Conversion Rate Trends</div><div style="overflow-x:auto"><table class="trends-table"><thead>'+convTrendHeader+'</thead><tbody>'+convTrendRows+'</tbody></table></div></div><div class="card section-gap"><div class="card-title">Volume Trends</div><div style="overflow-x:auto"><table class="trends-table"><thead>'+volTrendHeader+'</thead><tbody>'+volTrendRows+'</tbody></table></div></div>' : '<div class="empty-state card">Submit at least one quarter snapshot to see trends.</div>';
  return '<div class="trends-header"><h2 style="font-size:16px;font-weight:700;color:var(--warm);font-family:Playfair Display,serif">Quarterly <em style="color:var(--gold);font-style:italic">Trends</em></h2><button class="btn btn-print btn-sm" data-action="print-trends">Print Report</button></div><div class="q-grid">'+qCards+'</div>'+compareDrawer+timelineHtml+trendsTablesHtml;
}
// ===== RENDER INPUT CARD =====
function renderInputCard(){
  const d = state.drafts[state.currentQ];
  const fields = [
    {key:'visitors', label:'Visitors'},
    {key:'leads',    label:'Leads'},
    {key:'mqls',     label:'MQLs'},
    {key:'sqls',     label:'SQLs'},
    {key:'opps',     label:'Opportunities'},
    {key:'won',      label:'Won Deals'},
    {key:'asp',      label:'ASP ($)'},
    {key:'spend',    label:'Mktg Spend ($)'}
  ];
  const fieldHtml = fields.map(function(f){
    return '<div class="input-group"><label>'+f.label+'</label><input type="number" min="0" data-action="update-draft" data-field="'+f.key+'" value="'+d[f.key]+'"></div>';
  }).join("");
  return '<div class="card section-gap"><div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;flex-wrap:wrap;gap:10px"><div class="card-title" style="margin-bottom:0">'+state.currentQ+' \u2014 Enter Funnel Data</div><div style="display:flex;gap:6px">'+["Q1","Q2","Q3","Q4"].map(function(q){return '<button class="btn btn-sm '+(q===state.currentQ?"btn-primary":"btn-ghost")+'" data-action="set-quarter" data-q="'+q+'">'+q+'</button>';}).join("")+'</div></div><div class="input-grid">'+fieldHtml+'<div class="input-group notes-full"><label>Quarter Notes <span style="font-weight:400;color:var(--fog)">(optional, encouraged)</span></label><textarea data-action="update-notes" placeholder="Key events, campaigns, context for this quarter...">'+d.notes+'</textarea></div></div><div style="margin-top:16px;display:flex;gap:10px;flex-wrap:wrap"><button class="btn btn-primary" data-action="submit-snapshot">Submit '+state.currentQ+' Snapshot \u2192</button><button class="btn btn-ghost btn-sm" data-action="reset-draft">Reset</button><button class="btn btn-print btn-sm" data-action="print-current">Print Report</button></div></div>';
}
// ===== MAIN RENDER =====
function render(){
  const app = document.getElementById('app');
  const header = '<div class="hdr"><div class="hdr-left"><div style="font-family:Playfair Display,serif;font-size:18px;font-weight:900;color:var(--warm)">Pipeline <em style="color:var(--gold);font-style:italic">Fitness</em></div><div style="height:24px;width:1px;background:var(--goldDim)"></div><div class="tab-bar"><button class="tab-btn '+(state.tab==="funnel"?"active":"")+'" data-action="set-tab" data-tab="funnel">Funnel Analysis</button><button class="tab-btn '+(state.tab==="trends"?"active":"")+'" data-action="set-tab" data-tab="trends">Trends</button></div></div><div class="hdr-right"><div class="bench-selector"><button class="bench-btn '+(state.benchProfile==="smb"?"active":"")+'" data-action="set-bench" data-profile="smb">SMB</button><button class="bench-btn '+(state.benchProfile==="midmarket"?"active":"")+'" data-action="set-bench" data-profile="midmarket">Mid-Market</button><button class="bench-btn '+(state.benchProfile==="enterprise"?"active":"")+'" data-action="set-bench" data-profile="enterprise">Enterprise</button></div></div></div>';
  let tabContent = "";
  if(state.tab === "funnel"){
    tabContent = renderInputCard() + renderFunnel();
  } else {
    tabContent = renderTrends();
  }
  const credit = '<div class="credit">built by <a href="https://github.com/punsandrosess" target="_blank">punsandrosess</a></div><div class="credit" style="color:var(--warm);padding-top:0;margin-top:-12px">this framework is powered by Sam Kuehnle\u2019s excellent post titled \u201c<a href="https://www.samkuehnle.com/p/ive-audited-100-funnels-heres-what-i-found" target="_blank" style="color:var(--warm);text-decoration:underline">I\u2019ve audited 100+ funnels. Here\u2019s what I found.</a>\u201d</div>';
  app.innerHTML = header + tabContent + credit;
  openDiags.forEach(function(id){
    const el = document.getElementById('diag-'+id);
    if(el) el.classList.add('open');
  });
  if(state.editingNotes){
    const ta = document.getElementById('notes-edit-'+state.editingNotes) || document.getElementById('tl-notes-edit-'+state.editingNotes);
    if(ta){ ta.focus(); ta.setSelectionRange(ta.value.length, ta.value.length); }
  }
}
// ===== OPEN DIAGNOSTICS TRACKER =====
const openDiags = new Set();
// ===== EVENT DELEGATION =====
document.addEventListener('DOMContentLoaded', function(){
  loadState();
  render();
  document.getElementById('app').addEventListener('click', function(e){
    const el = e.target.closest('[data-action]');
    if(!el) return;
    const action = el.dataset.action;
    if(action === 'set-tab'){ state.tab = el.dataset.tab; render(); }
    else if(action === 'set-quarter'){ state.currentQ = el.dataset.q; saveState(); render(); }
    else if(action === 'set-bench'){ state.benchProfile = el.dataset.profile; saveState(); render(); }
    else if(action === 'submit-snapshot'){ submitSnapshot(); }
    else if(action === 'reset-draft'){ state.drafts[state.currentQ] = blankDraft(); saveState(); render(); }
    else if(action === 'print-current'){ printReport(null); }
    else if(action === 'print-quarter'){ printReport(el.dataset.key); }
    else if(action === 'print-trends'){
      const hasSnaps = Object.keys(state.quarters).length > 0;
      const firstKey = hasSnaps ? Object.keys(state.quarters)[0] : null;
      printReport(firstKey);
    }
    else if(action === 'toggle-diag'){
      const id = el.dataset.id;
      const body = document.getElementById('diag-'+id);
      if(body){
        body.classList.toggle('open');
        if(body.classList.contains('open')) openDiags.add(id);
        else openDiags.delete(id);
      }
    }
    else if(action === 'toggle-compare'){
      const key = el.dataset.key;
      if(state.compareKeys.includes(key)){
        state.compareKeys = state.compareKeys.filter(function(k){return k !== key;});
      } else if(state.compareKeys.length < 2){
        state.compareKeys = state.compareKeys.concat([key]);
      } else {
        state.compareKeys = [state.compareKeys[1], key];
      }
      saveState();
      render();
    }
    else if(action === 'edit-notes'){ state.editingNotes = el.dataset.key; render(); }
    else if(action === 'cancel-notes-edit'){ state.editingNotes = null; render(); }
    else if(action === 'save-notes'){
      const key = el.dataset.key;
      const ta = document.getElementById('notes-edit-'+key) || document.getElementById('tl-notes-edit-'+key);
      const newNotes = ta ? ta.value : "";
      if(state.quarters[key]) state.quarters[key].notes = newNotes;
      if(state.drafts[key]) state.drafts[key].notes = newNotes;
      state.editingNotes = null;
      saveState();
      render();
    }
  });
  document.getElementById('app').addEventListener('input', function(e){
    const el = e.target;
    if(el.dataset.action === 'update-draft'){
      const field = el.dataset.field;
      const val = parseFloat(el.value) || 0;
      state.drafts[state.currentQ][field] = val;
      saveState();
      renderLive();
    }
    if(el.dataset.action === 'update-notes'){
      state.drafts[state.currentQ].notes = el.value;
      saveState();
    }
  });
});
// ===== LIVE RE-RENDER =====
function renderLive(){
  const d = state.drafts[state.currentQ];
  const convs = computeConvs();
  const hs = healthScore(convs);
  const scoreEl = document.querySelector('.metric-tile .value');
  if(scoreEl){
    scoreEl.className = 'value '+scoreClass(hs);
    scoreEl.textContent = hs;
  }
}
</script>
</body>
</html>
